[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
solana_ekza_space = "2WtuXG6AX3erRp6eK5WiSTEEBec5zprQ7qLyLENfMQEH"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
litesvm = "anchor build -- --features litesvm-test && yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/ekza-space.ts"
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""
